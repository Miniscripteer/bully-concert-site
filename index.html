<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BULLY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #0a0a0a, #111);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 0.2em;
    }

    p {
      opacity: 0.6;
    }

    a {
      margin-top: 30px;
      display: inline-block;
      padding: 15px 30px;
      border-radius: 999px;
      background: white;
      color: black;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    a:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div>
    <h1>BULLY</h1>
    <p>Roblox Concert Experience</p>

    <a href="https://www.roblox.com/games/YOUR-GAME-ID" target="_blank">
      JOIN EXPERIENCE
    </a>

    <p style="margin-top:20px; font-size:12px; opacity:0.4;">
      LIVE EVENT • LIMITED ACCESS
    </p>
  </div>
</body>
</html>
