<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BULLY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  background: linear-gradient(to bottom, #0a0a0a, #111);
  color: white;
  font-family: Arial, sans-serif;
}

/* SIDE NAV */
.nav {
  position: fixed;
  left: 0;
  top: 0;
  height: 100%;
  width: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  align-items: center;
}

.nav a {
  writing-mode: vertical-rl;
  text-decoration: none;
  color: white;
  opacity: 0.6;
  font-size: 12px;
}

.nav a:hover {
  opacity: 1;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  font-size: 4rem;
  letter-spacing: 0.2em;
}

a.button {
  margin-top: 30px;
  display: inline-block;
  padding: 15px 30px;
  border-radius: 999px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
}

iframe {
  margin-top: 30px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="nav">
  <a href="/">HOME</a>
  <a href="/credits.html">CREDITS</a>
</div>

<div class="main">
  <div>
    <h1>BULLY</h1>
    <p style="opacity:0.6;">Roblox Concert Experience</p>

    <a class="button" href="https://www.roblox.com/games/136757600016645" target="_blank">
      JOIN EXPERIENCE
    </a>

    <!-- MUSIC PLAYER -->
    <iframe width="300" height="170"
      src="https://www.youtube.com/embed/u9v7ZkQqKYk"
      allow="autoplay">
    </iframe>

    <p style="margin-top:20px; font-size:12px; opacity:0.4;">
      LIVE EVENT • LIMITED ACCESS
    </p>
  </div>
</div>

</body>
</html>
