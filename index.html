<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FILLER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  background: url('https://i.imgur.com/jfR4Gz8.jpeg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  font-family: Arial, sans-serif;
}

/* DARK OVERLAY (makes text readable) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1;
}

/* ANNOUNCEMENT */
#announcement {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  color: black;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  z-index: 999;
}

/* NAV */
.nav {
  position: fixed;
  left: 0;
  top: 40px;
  height: 100%;
  width: 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  align-items: center;
  z-index: 2;
}

.nav a {
  writing-mode: vertical-rl;
  text-decoration: none;
  color: white;
  opacity: 0.6;
  font-size: 12px;
}

.nav a:hover {
  opacity: 1;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 2;
}

h1 {
  font-size: 4rem;
  letter-spacing: 0.2em;
}

.button {
  margin-top: 30px;
  display: inline-block;
  padding: 15px 30px;
  border-radius: 999px;
  background: white;
  color: black;
  text-decoration: none;
  font-weight: bold;
}

/* PLAYER RIGHT */
.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 2;
}

iframe {
  border-radius: 12px;
}
</style>
</head>

<body>

<div id="announcement"></div>

<div class="nav">
  <a href="/">HOME</a>
  <a href="/credits.html">CREDITS</a>
  <a href="/countdown.html">COUNTDOWN</a>
  <a href="/affiliates.html">AFFILIATES</a>
</div>

<div class="main">
  <div>
    <h1>FILLER</h1>
    <p style="opacity:0.6;">LiMosStuff's Debut Album.</p>

    <a class="button" href="https://distrokid.com/hyperfollow/limosstuff/filler?ref=release" target="_blank">
      PRESAVE
    </a>

    <p style="margin-top:20px; font-size:12px; opacity:0.4;">
      MUSIC ALBUM • LIMOSSTUFF
    </p>
  </div>
</div>

<script>
fetch('announcement.json')
  .then(res => res.json())
  .then(data => {
    if (data.enabled) {
      document.getElementById('announcement').innerText = data.text;
    } else {
      document.getElementById('announcement').style.display = "none";
    }
  })
  .catch(() => {
    document.getElementById('announcement').style.display = "none";
  });
</script>

</body>
</html>
